<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>纯色消消乐试玩</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="纯色消消乐试玩">
      <section class="topbar">
        <div>
          <h1>消消乐试玩</h1>
          <p>交换相邻色块，连成 3 个或更多即可消除。</p>
        </div>
        <button class="icon-button" id="restartButton" type="button" aria-label="重新开始" title="重新开始">
          ↻
        </button>
      </section>

      <section class="stats" aria-label="游戏数据">
        <div class="stat">
          <span>分数</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="stat">
          <span>步数</span>
          <strong id="movesValue">30</strong>
        </div>
        <div class="stat">
          <span>目标</span>
          <strong>3000</strong>
        </div>
      </section>

      <section class="board-wrap">
        <div class="board" id="board" aria-label="游戏棋盘"></div>
      </section>

      <section class="status-line" id="statusLine" aria-live="polite">
        选择一个色块，再选择相邻色块进行交换。
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
